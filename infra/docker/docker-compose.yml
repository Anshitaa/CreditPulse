version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: creditpulse-postgres
    environment:
      POSTGRES_USER: creditpulse
      POSTGRES_PASSWORD: creditpulse
      POSTGRES_DB: creditpulse
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../warehouse/migrations/01_schemas.sql:/docker-entrypoint-initdb.d/01_schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creditpulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: creditpulse-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: creditpulse-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      retries: 5

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: creditpulse-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092

  redis:
    image: redis:7-alpine
    container_name: creditpulse-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: creditpulse-mlflow
    ports:
      - "5001:5001"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://creditpulse:creditpulse@postgres:5432/creditpulse
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlruns
    volumes:
      - mlflow_artifacts:/mlruns
    command: mlflow server --host 0.0.0.0 --port 5001 --backend-store-uri postgresql://creditpulse:creditpulse@postgres:5432/creditpulse
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    container_name: creditpulse-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://creditpulse:creditpulse@postgres:5432/creditpulse
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MLFLOW_TRACKING_URI: http://mlflow:5001
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 15s
      retries: 5

  frontend:
    build:
      context: ../../frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
    container_name: creditpulse-frontend
    ports:
      - "5174:80"
    depends_on:
      - api

volumes:
  postgres_data:
  mlflow_artifacts:
